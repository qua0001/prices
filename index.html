<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prices</title>
  <link rel="manifest" href="manifest.json">
  <link rel=stylesheet href="styles/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/main.js" defer></script>
</head>

<body>

  <main class="main">
    <div class="empty-state">
      <div class="empty-state__icon">📦</div>
      <h2 class="empty-state__title">Здесь пока пусто</h2>
      <p class="empty-state__text">Нажмите на кнопку «+», чтобы добавить свой первый товар</p>
    </div>
    <div class="product-list">
    </div>
    <!-- Кнопка для создания новой категории/товара (появление предварительно созданной формы) -->
    <button class="create-button">+</button>
  </main>

  <!-- Форма добавления новой категории/товара -->
  <div class="add-form">
    <!-- Затемнение основного контента, когда форма открыта -->
    <div class="add-form__overlay"></div>
    <!-- Форма -->
    <div class="add-form__content">
      <div class="add-form__title">Новый товар</div>

      <form action="">
        <div class="add-form__field">
          <label for="product-name">Название товара:</label>
          <input type="text" name="product-name" id="product-name" required maxlength="40"
            placeholder="Введите название..." autocomplete="off" spellcheck="false">
        </div>
        <div class="add-form__field">
          <label for="product-price">Стоимость товара:</label>
          <input type="number" name="product-price" min="0" max="999999" required inputmode="decimal" id="product-price"
            placeholder="Введите стоимость..." spellcheck="false">
        </div>
        <div class="add-form__field">
          <div class="add-form__label">Категория товара</div>
          <select name="product-category" id="product-category" required>
            <option value="" disabled selected>Выберите категорию...</option>

          </select>

          <input type="text" name="custom-category" id="add-category" maxlength="25" required
            placeholder="Введите название..." class="add-form__hidden-input is-hidden" style="display: none;" disabled>

          <button type="button" class="add-form__toggle-btn">+ Добавить новую категорию</button>
        </div>

        <div class="add-form__field">
          <div class="add-form__label">Тип цены</div>
          <div class="price-unit">
            <label class="price-unit__item">
              <input type="radio" name="price-unit" value="шт." checked>
              <span>шт.</span>
            </label>
            <label class="price-unit__item">
              <input type="radio" name="price-unit" value="кг">
              <span>кг</span>
            </label>
          </div>
        </div>
        <div class="add-form__field">
          <label for="product-image">Фото товара (необязательно):</label>
          <input type="file" id="product-image" accept="image/*" class="add-form__image-input">
        </div>
        <div class="add-form__actions">
          <button type="submit" class="add-form__btn add-form__btn-submit">Добавить</button>
          <button type="button" class="add-form__btn add-form__btn-cancel">Отменить</button>
        </div>
      </form>
    </div>
  </div>

  <datalist id="existing-categories"></datalist>

  <div class="transfer-modal" id="transfer-modal" style="display: none;">
    <div class="add-form__overlay" onclick="closeTransferModal()"></div>
    <div class="add-form__content">
      <div class="add-form__title">Перенос товара</div>
      <div class="add-form__field">
        <label>Выберите или введите новую категорию:</label>
        <input type="text" id="transfer-category-input" list="existing-categories" placeholder="Начните писать..."
          autocomplete="off">
        <p id="transfer-suggestion" style="font-size: 12px; color: #666; margin-top: 5px;"></p>
      </div>
      <div class="add-form__actions">
        <button type="button" class="add-form__btn add-form__btn-submit"
          onclick="confirmTransfer()">Переместить</button>
        <button type="button" class="add-form__btn add-form__btn-cancel" onclick="closeTransferModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div class="history-modal" id="history-modal" style="display: none;">
    <div class="history-modal__container">
      <div class="history-modal__header">
        <h3>История изменений</h3>
        <button onclick="closeHistory()">✕</button>
      </div>
      <div class="history-modal__content" id="history-content">
      </div>
    </div>
  </div>

  <div id="image-lightbox" class="lightbox">
    <div class="lightbox__overlay"></div>
    <img src="" alt="" class="lightbox__img">
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>

</html>
